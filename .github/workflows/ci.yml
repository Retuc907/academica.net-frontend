name: CI Spring Boot Docker
on:
  push:
    branches:
      - main
jobs:
  
  Build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Descargar codigo frontend
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Analisis SonarQube (Quality Gate)
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.sources=.
            -Dsonar.qualitygate.wait=true
            

      - name: Construir imagen Docker del frontend
        run: docker build -t retuc907/frontend-academia:latest .
      - name: Login Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Construir imagen Docker para DockerHub
        run: docker build --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} -t retuc907/frontend-react:latest .
      - name: Subir imagen Docker a Dockerhub
        run: docker push retuc907/frontend-react:latest

  deploy-frontend:
    needs: build-frontend
    runs-on: self-hosted
    steps:
      - name: Actualizar contenedor frontend
        run: |
          cd $env:USER_DOCKER_COMPOSE_RELATIVE_PATH
          docker compose pull
          docker compose up -d --remove-orphans
name: CI — Build y E2E

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build

  e2e-login:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: browser-actions/setup-chrome@v1

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Start preview server
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4173 && break
            sleep 2
          done

      - name: Run Selenium login tests
        env:
          CI: "true"
          TEST_BASE_URL: http://127.0.0.1:4173
          TEST_TIMEOUT: "120000"
        run: npm run test:e2e

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: tests/screenshots/

  performance:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Start preview server
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4173 && break
            sleep 2
          done

      - name: Run k6 performance test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/performance/login-load-test.js
        env:
          BASE_URL: http://127.0.0.1:4173
