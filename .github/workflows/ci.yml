name: CI — Build y E2E

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build

  e2e-login:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: browser-actions/setup-chrome@v1

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Start preview server
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4173 && break
            sleep 2
          done

      - name: Run Selenium login tests
        env:
          CI: "true"
          TEST_BASE_URL: http://127.0.0.1:4173
          TEST_TIMEOUT: "120000"
        run: npm run test:e2e

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: tests/screenshots/

  performance:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Start preview server
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4173 && break
            sleep 2
          done

      - name: Run k6 performance test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/performance/login-load-test.js
        env:
          BASE_URL: http://127.0.0.1:4173
